<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>NotPhilSledge</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0D0F;--bg2:#18181B;--bg3:#27272A;--purple:#8B5CF6;--gold:#F59E0B;--silver:#9CA3AF;--bronze:#CD7F32}
body{font-family:Inter,sans-serif;background:var(--bg);color:#fff;margin:0;padding:20px}
.container{max-width:1100px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--bg3);border-radius:16px;padding:20px;text-align:center}
.statv{font-size:32px;font-weight:700}
.statl{font-size:12px;color:#71717a;text-transform:uppercase}
.lists{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.list{background:var(--bg2);border:1px solid var(--bg3);border-radius:16px;padding:20px}
.list-item{display:flex;align-items:center;padding:12px;background:var(--bg3);border-radius:10px;margin-bottom:8px}
.rank{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;margin-right:12px}
.r1{background:linear-gradient(135deg,var(--gold),#D97706);color:#000}
.r2{background:linear-gradient(135deg,var(--silver),#6B7280);color:#000}
.r3{background:linear-gradient(135deg,var(--bronze),#B45309);color:#000}
.r0{background:var(--bg2);color:#71717a}
.pfp{width:40px;height:40px;border-radius:50%;margin-right:12px;background:var(--purple);border:2px solid var(--purple)}
.u{font-weight:600;color:var(--purple);text-decoration:none;font-size:14px}
.c{color:var(--purple);font-weight:700;margin-left:auto}
h2{font-size:16px;margin-bottom:16px}
</style>
</head>
<body>
<div class="container">
<h1>NotPhilSledge Analytics</h1>
<div class="stats">
<div class="stat"><div class="statv">98</div><div class="statl">Tweets</div></div>
<div class="stat"><div class="statv">2.5K</div><div class="statl">Impressions</div></div>
<div class="stat"><div class="statv">181</div><div class="statl">Engagements</div></div>
<div class="stat"><div class="statv">7.2%</div><div class="statl">Rate</div></div>
</div>
<div class="lists">
<div class="list"><h2>You Replied To</h2><div id="r1"></div></div>
<div class="list"><h2>Reply Reciprocity</h2><div id="r2"></div></div>
</div>
</div>
<script>
const pfps = {"Noxifer81": "/9j/4AAQSkZJRgABAQAAAQABAAD/4gKgSUNDX1BST0ZJTEUAAQEAAAKQbGNtcwQwAABtbnRyUkdCIFhZ...", "AllaAisling": "/9j/4AAQSkZJRgABAQAAAQABAAD/4gKgSUNDX1BST0ZJTEUAAQEAAAKQbGNtcwQwAABtbnRyUkdCIFhZ...", "Julian_cano_": "/9j/4AAQSkZJRgABAQAAAQABAAD/4gKgSUNDX1BST0ZJTEUAAQEAAAKQbGNtcwQwAABtbnRyUkdCIFhZ...", "NEXUS_TO_NOVA": "/9j/4AAQSkZJRgABAQAAAQABAAD/4gKgSUNDX1BST0ZJTEUAAQEAAAKQbGNtcwQwAABtbnRyUkdCIFhZ...", "MrsSpitFire252": "/9j/4AAQSkZJRgABAQAAAQABAAD/4gKgSUNDX1BST0ZJTEUAAQEAAAKQbGNtcwQwAABtbnRyUkdCIFhZ...", "RoyalKongz": "/9j/4AAQSkZJRgABAQAAAQABAAD/4gKgSUNDX1BST0ZJTEUAAQEAAAKQbGNtcwQwAABtbnRyUkdCIFhZ...", };
const d1=[{u:"Noxifer81",c:5},{u:"AllaAisling",c:4},{u:"Julian_cano_",c:3},{u:"NEXUS_TO_NOVA",c:3},{u:"RoyalKongz",c:2}];
const d2=[{u:"MrsSpitFire252",c:3},{u:"AllaAisling",c:2},{u:"Noxifer81",c:2}];
function r(d,id){d.forEach((x,i)=>{const r=i===0?"r1":i===1?"r2":i===2?"r3":"r0";const p=pfps[x.u]?"background-image:url(data:image/jpeg;base64,"+pfps[x.u]+")":"background:#8B5CF6";document.getElementById(id).innerHTML+=`<div class="list-item"><div class="rank ${r}">${i+1}</div><div class="pfp" style="${p};background-size:cover"></div><a class="u" href="https://x.com/${x.u}" target="_blank">@${x.u}</a><div class="c">${x.c}</div></div>`})}
r(d1,"r1");r(d2,"r2");
</script>
</body>
</html>
